name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Compile Python
        run: python -m compileall main.py core database models repositories services scripts ui workers
      - name: Responsive QML smoke test
        shell: pwsh
        run: |
          $env:QT_QPA_PLATFORM='offscreen'
          python .\scripts\check_responsive.py


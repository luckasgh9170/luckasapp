name: Version Management

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version number
        required: true
        default: 1.0.1
      notes:
        description: Release notes
        required: false
        default: Maintenance update

jobs:
  bump:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install orjson
      - name: Update version metadata
        run: python .\scripts\bump_version.py --version "${{ inputs.version }}" --notes "${{ inputs.notes }}"
      - name: Generate changelog
        run: python .\scripts\generate_changelog.py
      - name: Commit version update
        shell: pwsh
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json CHANGELOG.md
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Release metadata ${{ inputs.version }}"
            git tag "v${{ inputs.version }}"
            git push origin main --tags
          } else {
            Write-Host "No version changes."
          }
